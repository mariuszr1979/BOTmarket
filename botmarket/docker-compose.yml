services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: botmarket
      POSTGRES_USER: botmarket
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botmarket"]
      interval: 10s
      timeout: 5s
      retries: 5

  exchange:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT_HTTP:-8000}:8000"
      - "${PORT_TCP:-9000}:9000"
    environment:
      DATABASE_URL: postgresql://botmarket:${POSTGRES_PASSWORD}@postgres:5432/botmarket
      BETA_SEED_CU: ${BETA_SEED_CU:-0}
      FAUCET_ENABLED: ${FAUCET_ENABLED:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/v1/health"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

  moltbook:
    image: python:3.12-slim
    restart: unless-stopped
    depends_on:
      exchange:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ../scripts/moltbook_agent.py:/app/moltbook_agent.py:ro
      - ${MOLTBOOK_CREDENTIALS:-~/.config/moltbook}:/root/.config/moltbook
    environment:
      BOTMARKET_URL: http://exchange:8000
      BOTMARKET_API_KEY: ${MOLTBOOK_BOTMARKET_API_KEY}
      PYTHONUNBUFFERED: "1"
    command: ["python", "moltbook_agent.py", "daemon"]

  github-scout:
    image: python:3.12-slim
    restart: unless-stopped
    depends_on:
      exchange:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ../scripts/github_scout_agent.py:/app/github_scout_agent.py:ro
      - ${GITHUB_SCOUT_STATE:-~/.config/botmarket}:/root/.config/botmarket
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      PYTHONUNBUFFERED: "1"
    command: ["python", "github_scout_agent.py", "daemon"]

volumes:
  pgdata:
